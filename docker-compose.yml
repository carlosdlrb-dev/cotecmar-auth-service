services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8000:80"
    environment:
      APP_NAME: Laravel
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: auth_service
      DB_USERNAME: auth_user
      DB_PASSWORD: auth_password
      JWT_SECRET: V9FutA6STy01u4eiS5xZwzmrEoXAsIa4HRHCg78QMHW8ifXFupTgIToJLWIkJwcs
      JWT_TTL: 60
      JWT_ALGO: HS256
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - auth-network

  mysql:
    image: mysql:8.0
    container_name: auth-mysql
    environment:
      MYSQL_DATABASE: auth_service
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: auth_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auth-network

volumes:
  mysql-data:

networks:
  auth-network:
    driver: bridge
